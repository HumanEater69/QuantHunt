name: Frontend Deploy (Vercel)

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Project Settings
        working-directory: frontend
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to Vercel (Production)
        id: deploy
        working-directory: frontend
        run: |
          deployment_url=$(vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }} | tail -n 1 | tr -d '\r')
          echo "deployment_url=${deployment_url}" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: ${deployment_url}"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Alias Custom Domain
        shell: bash
        working-directory: frontend
        run: |
          custom_domain="${{ secrets.VERCEL_CUSTOM_DOMAIN }}"
          if [ -z "$custom_domain" ]; then
            custom_domain="quanthunt.vercel.com"
          fi

          alias_token="${{ secrets.VERCEL_DOMAIN_TOKEN }}"
          if [ -z "$alias_token" ]; then
            alias_token="${{ secrets.VERCEL_TOKEN }}"
          fi

          set +e
          vercel alias set "${{ steps.deploy.outputs.deployment_url }}" "$custom_domain" --token="$alias_token"
          status=$?
          set -e

          if [ $status -ne 0 ]; then
            echo "::warning::Could not alias $custom_domain. Ensure the domain is owned by the same Vercel scope as this project, or set VERCEL_DOMAIN_TOKEN with access to that domain."
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Verify Custom Domain
        shell: bash
        run: |
          custom_domain="${{ secrets.VERCEL_CUSTOM_DOMAIN }}"
          if [ -z "$custom_domain" ]; then
            custom_domain="quanthunt.vercel.com"
          fi

          set +e
          curl -I "https://$custom_domain"
          status=$?
          set -e

          if [ $status -ne 0 ]; then
            echo "::warning::Custom domain verification request failed for $custom_domain."
          fi
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}