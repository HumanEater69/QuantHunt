name: Deploy Frontend (Vercel)

on:
  push:
    branches: ["master", "main"]
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-vercel.yml"
  workflow_dispatch:

jobs:
  test-backend:
    name: New CBOM logic tests pass
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run scoring and CBOM regression tests
        run: |
          python -m unittest tests.test_offline_and_scoring -q

  deploy-frontend-vercel:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate Vercel secrets
        run: |
          if [ -z "${{ secrets.VERCEL_ORG_ID }}" ]; then
            echo "Missing VERCEL_ORG_ID in repository secrets."
            exit 1
          fi
          if [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "Missing VERCEL_PROJECT_ID in repository secrets."
            exit 1
          fi

      - name: Decide deploy mode
        id: deploy_mode
        run: |
          token="${{ secrets.VERCEL_TOKEN }}"
          if [ -z "$token" ] || [ "$token" = "REPLACE_WITH_REAL_VERCEL_TOKEN" ]; then
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
            echo "Using fallback mode: token is missing/placeholder."
          else
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Show Vercel target (temporary debug)
        run: |
          org_hash="$(printf '%s' "${{ secrets.VERCEL_ORG_ID }}" | sha256sum | cut -c1-10)"
          project_hash="$(printf '%s' "${{ secrets.VERCEL_PROJECT_ID }}" | sha256sum | cut -c1-10)"
          echo "Vercel org id hash prefix: ${org_hash}"
          echo "Vercel project id hash prefix: ${project_hash}"
          echo "Vercel deploy path: frontend"

      - name: Install Vercel CLI
        if: ${{ steps.deploy_mode.outputs.can_deploy == 'true' }}
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        if: ${{ steps.deploy_mode.outputs.can_deploy == 'true' }}
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy frontend to Vercel production
        if: ${{ steps.deploy_mode.outputs.can_deploy == 'true' }}
        working-directory: frontend
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: vercel deploy --prod --yes --token="$VERCEL_TOKEN"

      - name: Skip deploy (fallback)
        if: ${{ steps.deploy_mode.outputs.can_deploy != 'true' }}
        run: echo "Skipped Vercel CLI deploy in GitHub Actions because VERCEL_TOKEN is not configured yet."
