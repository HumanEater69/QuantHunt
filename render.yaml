services:
  - type: web
    name: quanthunt-api
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: bash -c "echo 'Starting web service...' && export PYTHONUNBUFFERED=1 && python -m uvicorn backend.main:app --host 0.0.0.0 --port 10000"
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PORT
        value: "10000"
      - key: DATABASE_URL
        value: "postgresql://postgres:8YWXsxj84%21%233%234m1b%5EZ%25@db.wqhhuafnlykwpyktgats.supabase.co:5432/postgres"
      - key: BANKING_DATABASE_URL
        value: "postgresql://postgres:8YWXsxj84%21%233%234m1b%5EZ%25@db.wqhhuafnlykwpyktgats.supabase.co:5432/postgres"
      - key: SUPABASE_URL
        value: "https://wqhhuafnlykwpyktgats.supabase.co"
      - key: CORS_ALLOW_ORIGINS
        sync: false
      - key: USE_CELERY
        value: "false"
      - key: SINGLE_FORCE_RUNNING_ON_SUBMIT
        value: "true"
      - key: FLEET_FORCE_RUNNING_ON_SUBMIT
        value: "true"
      - key: FLEET_FORCE_ASYNCIO_DISPATCH
        value: "true"
      - key: VPN_ENFORCE_BLOCK
        value: "false"

  - type: worker
    name: quanthunt-supabase-worker
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: python -m backend.supabase_worker
    autoDeploy: true
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: QUANTHUNT_WORKER_POLL_SECONDS
        value: "8"
